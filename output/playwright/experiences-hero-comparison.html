<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Experiences Hero Comparison</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050505;
        color: #f5f5f0;
      }

      .wrap {
        width: 2048px;
        margin: 0 auto;
        padding: 28px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .panel {
        background: #0a0a0a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .label {
        padding: 14px 18px;
        font-size: 12px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .placeholder {
        min-height: 1100px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 48%),
          linear-gradient(180deg, #181818 0%, #080808 100%);
      }

      .placeholder p {
        max-width: 560px;
        margin: 0;
        text-align: center;
        line-height: 1.7;
        font-size: 22px;
        color: rgba(255, 255, 255, 0.76);
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="grid">
        <article class="panel">
          <div class="label">Left · Rocket Reference</div>
          <div class="placeholder">
            <p>
              The Rocket reference was provided inline in the chat, but this runtime could not
              extract that prompt image as a file for automated compositing.
            </p>
          </div>
        </article>

        <article class="panel">
          <div class="label">Right · Localhost Result</div>
          <img src="./experiences-hero-crop.png" alt="Localhost Experiences hero screenshot" />
        </article>
      </section>
    </main>
  </body>
</html>
